########################################################################
#  https://kind.sigs.k8s.io/docs/user/configuration/
########################################################################
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: agentregistry
containerdConfigPatches:
- |-
  [plugins."io.containerd.grpc.v1.cri".registry]
    config_path = "/etc/containerd/certs.d"
# network configuration
networking:
  # WARNING: It is _strongly_ recommended that you keep this the default
  # (127.0.0.1) for security reasons. However, it is possible to change this.
  apiServerAddress: "127.0.0.1"
  # By default, the API server listens on a random open port.
  # You may choose a specific port but probably don't need to in most cases.
  # Using a random port makes it easier to spin up multiple clusters.
  # apiServerPort: 6443

# this may be used to e.g. disable beta / alpha APIs.
runtimeConfig:
  "api/alpha": "false"

# add to the apiServer certSANs:
#   "docker"        - for docker-in-docker (DinD) setups
#   "172.17.0.1"    - Docker bridge gateway IP on Linux (CI), so the agentregistry
#                     server container can reach the Kind API server without disabling TLS
kubeadmConfigPatchesJSON6902:
  - group: kubeadm.k8s.io
    version: v1beta2
    kind: ClusterConfiguration
    patch: |
      - op: add
        path: /apiServer/certSANs/-
        value: docker
      - op: add
        path: /apiServer/certSANs/-
        value: "172.17.0.1"

# this is the default configuration for nodes
nodes:
  - role: control-plane
# Example of port mappings for the control-plane node
#    extraPortMappings:
#      - containerPort: 30884
#        hostPort: 30884
#      - containerPort: 30885
#        hostPort: 30885