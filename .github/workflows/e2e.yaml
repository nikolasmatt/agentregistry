name: E2E Tests

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
    types: [checks_requested]
  workflow_dispatch:

env:
  BUILDX_BUILDER_NAME: arctl-e2e-builder

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        backend: [k8s, docker]
    name: e2e (${{ matrix.backend }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: ${{ env.BUILDX_BUILDER_NAME }}
          use: true
          driver-opts: network=host
      - name: Run E2E tests
        env:
          DOCKER_BUILDER: "docker buildx"
          DOCKER_BUILD_ARGS: "--push --platform linux/amd64"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: make test-e2e-${{ matrix.backend }}

      - name: Dump cluster state on failure
        if: failure() && matrix.backend == 'k8s'
        run: make dump-kind-state
